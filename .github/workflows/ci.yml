name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Build debug
        run: swift build

      - name: Build release app bundle
        run: ./scripts/build_app.sh

      - name: Verify bundled gif exists
        run: test -f dist/NyanBar.app/Contents/Resources/original.gif

      - name: Zip app bundle artifact
        run: ditto -c -k --sequesterRsrc --keepParent dist/NyanBar.app dist/NyanBar.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyanbar-app-macos
          path: dist/NyanBar.app.zip
          if-no-files-found: error
