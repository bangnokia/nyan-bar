name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release app bundle
        run: ./scripts/build_app.sh

      - name: Package app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/NyanBar.app dist/NyanBar-${TAG_NAME}.zip

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NyanBar-${{ env.TAG_NAME }}.zip
          generate_release_notes: true

      - name: Upload asset to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/NyanBar-${{ env.TAG_NAME }}.zip
