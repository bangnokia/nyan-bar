name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
      APP_PATH: dist/NyanBar.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release app bundle
        run: ./scripts/build_app.sh

      - name: Import signing certificate (optional)
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [[ -n "${APPLE_CERT_P12_BASE64}" && -n "${APPLE_CERT_PASSWORD}" ]]; then
            echo "Importing signing certificate."
            echo "$APPLE_CERT_P12_BASE64" | base64 --decode > signing-cert.p12
            security create-keychain -p "" build.keychain
            security set-keychain-settings -lut 21600 build.keychain
            security unlock-keychain -p "" build.keychain
            security import signing-cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            security list-keychains -d user -s build.keychain
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          else
            echo "No signing certificate secrets found; skipping certificate import."
          fi

      - name: Sign app (Developer ID or ad-hoc)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "${APPLE_SIGNING_IDENTITY}" ]]; then
            echo "Signing with Developer ID identity."
            codesign --force --deep --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          else
            echo "No Developer ID identity found. Falling back to ad-hoc signature."
            codesign --force --deep --options runtime --sign - "$APP_PATH"
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Prepare notarization archive
        run: ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" dist/NyanBar-notary.zip

      - name: Notarize + staple app (optional)
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "${APPLE_NOTARY_APPLE_ID}" && -n "${APPLE_NOTARY_PASSWORD}" && -n "${APPLE_NOTARY_TEAM_ID}" && -n "${APPLE_SIGNING_IDENTITY}" ]]; then
            echo "Submitting for notarization."
            xcrun notarytool submit dist/NyanBar-notary.zip \
              --apple-id "$APPLE_NOTARY_APPLE_ID" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --team-id "$APPLE_NOTARY_TEAM_ID" \
              --wait
            xcrun stapler staple "$APP_PATH"
          else
            echo "Notarization secrets/identity not fully configured; skipping notarization."
          fi

      - name: Package app bundle for release
        run: ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" dist/NyanBar-${TAG_NAME}.zip

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NyanBar-${{ env.TAG_NAME }}.zip
          generate_release_notes: true

      - name: Upload asset to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/NyanBar-${{ env.TAG_NAME }}.zip
